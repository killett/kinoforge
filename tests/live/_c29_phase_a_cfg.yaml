# C29 Phase A acceptance-smoke cfg — boot-phase STALL_REAP fires during
# engine.provision while the pod sleeps with no GPU work.
#
# Compute: cheapest RunPod offer (RTX 3070 ~$0.13/hr ⇒ ≤ $0.20 for ~300s).
# Engine:  FakeEngine — no model load, no inference; pure sleep in provision.
# Lifecycle:
#   heartbeat_interval_s: 10  (tight, so 6 ticks fit inside the window)
#   stall_reap_enabled:   true
#   stall_window_s:       60   (6 × interval = STALL fires after 60 s low-util)
#   stall_gpu_threshold:  5
#   stall_cpu_threshold:  20
#   boot_timeout:         5m   (outer backstop — STALL fires well before this)
# Live spend ceiling: $0.20.

engine:
  kind: fake

models: []

compute:
  provider: runpod
  image: "alpine:latest"
  mode: pod
  warm_reuse_auto_attach: false
  heartbeat_mode: graphql-tag
  requirements:
    min_vram_gb: 0
    min_cuda: "0.0"
    max_usd_per_hr: 10.0
    disk_gb: 0
  lifecycle:
    idle_timeout: 30m
    job_timeout: 10m
    time_buffer: 1m
    max_lifetime: 15m
    boot_timeout: 5m
    budget: 1.0
    heartbeat_interval_s: 10
    stall_reap_enabled: true
    stall_window_s: 60
    stall_gpu_threshold: 5
    stall_cpu_threshold: 20

spec: {}
params: {}
