# B3 live smoke cfg — fake engine + RunPod + graphql-tag heartbeat.
#
# Rationale: ComfyUI + RunPod + heartbeat is blocked by C25 (selfterm
# vs heartbeat dockerArgs collision). Fake engine is the only RunPod-
# HB-safe engine (per _RUNPOD_HEARTBEAT_SAFE_ENGINES = {"fake"}). The
# smoke validates the B3 mechanics end-to-end (real RunPod pod
# creation, real ledger, real heartbeat substrate, cross-CLI scan,
# pod_id continuity) without exercising the workload — which is
# independently tested via the existing wan-t2v live suite.
#
# Cost guards:
#   - max_usd_per_hr: 0.50 (filters expensive GPUs upstream)
#   - budget: 1.00 (BudgetTracker tears down mid-run; fake gen is ~0s)
#   - idle_timeout: 5m (no model load → fast destroy on idle)
#   - max_lifetime: 30m (gen 1 cold ~1min + 30s sleep + gen 2 warm
#     ~30s = 2-3min real; 30m gives 10× headroom)
#   - boot_timeout: 10m (RunPod pod-ready usually ~30-90s)

engine:
  kind: fake
  precision: fp16

models:
  - ref: "https://example.com/fake-base.safetensors"
    kind: base
    target: diffusion_models

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: pod
  # B3 default — explicit for documentation.
  warm_reuse_auto_attach: true
  # B5a substrate — RunPod podEditJob endpoint stamps last_heartbeat
  # into pod dockerArgs (HB-safe with fake engine per C25 guard).
  heartbeat_mode: graphql-tag
  requirements:
    min_vram_gb: 8
    min_cuda: "12.0"
    max_usd_per_hr: 0.50
    gpu_preference:
      - "NVIDIA GeForce RTX 4090"
      - "NVIDIA RTX A5000"
      - "NVIDIA GeForce RTX 3090"
    disk_gb: 20
  lifecycle:
    idle_timeout: 5m
    job_timeout: 5m
    time_buffer: 2m
    max_lifetime: 30m
    boot_timeout: 10m
    budget: 1.0
    # B3 — heartbeat cadence; 30s mirrors Layer V default.
    heartbeat_interval_s: 30
