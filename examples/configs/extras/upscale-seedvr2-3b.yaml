# Upscale-only cfg for `kinoforge upscale`.
#
# Used as:
#   pixi run kinoforge upscale \
#     --config examples/configs/upscale-seedvr2-3b.yaml \
#     --video file:///path/to/clip.mp4 \
#     --no-reuse
#
# The pod's diffusers server (wan_t2v_server) exposes /upscale; SeedVR2Engine
# POSTs the clip and polls status. UpscaleStage in the orchestrator routes
# the call via `cfg.upscale.engine`.

engine:
  kind: diffusers
  precision: fp8
  diffusers:
    image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
    server_cmd:
      - "python"
      - "-m"
      - "kinoforge.engines.diffusers.servers.wan_t2v_server"
    pip:
      - "torch==2.6.0"
      - "torchvision==0.21.0"
      - "torchaudio==2.6.0"
      - "diffusers>=0.32"
      - "fastapi>=0.115"
      - "uvicorn>=0.30"
      - "imageio[ffmpeg]>=2.34"

models:
  - kind: base
    ref: "hf:ByteDance-Seed/SeedVR2-3B"
    target: diffusion_models

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  requirements:
    min_vram_gb: 24
    disk_gb: 100

spec:
  # spec.model is informational only for upscale-only cfgs; satisfies the
  # test_no_unknown_slug_for_example_configs integration test (loads the
  # cfg + asserts DiffusersEngine.model_identity returns non-empty).
  model: "seedvr2-3b-fp8"

upscale:
  engine: seedvr2
  scale: 2x
  seedvr2:
    variant: 3B
    precision: fp8
