# kinoforge example: HostedAPIEngine (user-deployed shim)
#
# HostedAPIEngine speaks a SYNTHETIC server contract:
#
#   POST {endpoint}                  -> {"job_id": "..."}
#   GET  {endpoint}/status/{job_id}  -> {"status": "done"|"running"|..., "<url_path>": "..."}
#   GET  {health_url}                -> 200 OK
#
# No public provider (fal.ai, Replicate, HuggingFace) implements this contract.
# Use HostedAPIEngine when you have deployed your OWN inference shim that wraps a
# real backend with the contract above.  For real public providers, see the
# per-provider engines (e.g. examples/configs/fal-t2v.yaml).

engine:
  kind: hosted
  precision: ""
  hosted:
    provider: my-shim
    endpoint: "https://your-shim.example.com/inference"
    api_key_env: "MY_SHIM_KEY"
    health_url: "https://your-shim.example.com/health"
    url_path: video.url
    # Optional: top-level body key where the user prompt is routed when
    # spec.prompt is absent. Default "prompt"; set null for endpoints
    # that reject unknown top-level fields.
    # prompt_body_key: prompt

models:
  - ref: "hf:Wan-AI/Wan2.2-T2V-A14B:wan2.2_14b.safetensors"
    kind: base
    target: checkpoints

lifecycle:
  budget: 5.0
  # Layer U — heartbeat persistence. Uncomment to enable a background
  # thread that pings provider.heartbeat() and persists the timestamp
  # to the ledger every N seconds. Operator-visible via
  # `kinoforge status --id <id>` ("last_heartbeat=<ISO>"). Default null
  # (disabled). Recommended >= 10s to avoid lock contention at scale.
  # heartbeat_interval_s: 30
  # Layer V — post-session warm-reuse grace window. Sentinel-stale
  # entries within this window are classified LIVE (not ORPHAN_REAP).
  # grace_after_session_s: 300

# --- Layer K: per-job spec & params -----------------------------------------
# spec: is the engine-interpreted wire payload.  HostedAPIBackend.submit reads
# spec.model + spec.params and writes them into the POST body.
#
# Layer M: spec.model is now the SINGLE source of truth for hosted model
# identity, read both by HostedAPIBackend.submit (wire body) and by
# HostedAPIEngine.key_base(cfg) (cache identity).
spec:
  model: "wan-ai/Wan2.2-T2V-A14B"
  params:
    guidance_scale: 5.0

# params: are engine-neutral knobs every engine honors identically.  Flow into
# GenerationJob.params and merge segment-wins via Segment.params.
params:
  fps: 24
  num_frames: 81
  steps: 30

# Layer O — user-facing output directory.  Uncomment to override defaults.
# Final clips are published to <dir>/<batch_id>?/{YYYYMMDD-HHMMSS}_{prompt-slug}{ext}.
# Internal artifacts (profile cache, ledger, weights) stay under --state-dir
# regardless of this block.
# output:
#   kind: local        # only "local" ships in v1
#   dir: output        # relative-to-cwd or absolute
#   enabled: true      # set false to skip publishing for this config
