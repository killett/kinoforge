# kinoforge example: HostedAPIEngine (user-deployed shim)
#
# HostedAPIEngine speaks a SYNTHETIC server contract:
#
#   POST {endpoint}                  -> {"job_id": "..."}
#   GET  {endpoint}/status/{job_id}  -> {"status": "done"|"running"|..., "<url_path>": "..."}
#   GET  {health_url}                -> 200 OK
#
# No public provider (fal.ai, Replicate, HuggingFace) implements this contract.
# Use HostedAPIEngine when you have deployed your OWN inference shim that wraps a
# real backend with the contract above.  For real public providers, see the
# per-provider engines (e.g. examples/configs/fal.yaml).

engine:
  kind: hosted
  precision: ""
  hosted:
    provider: my-shim
    endpoint: "https://your-shim.example.com/inference"
    model: "wan-ai/Wan2.2-T2V-A14B"
    api_key_env: "MY_SHIM_KEY"
    health_url: "https://your-shim.example.com/health"
    url_path: video.url
    # Optional: top-level body key where the user prompt is routed when
    # spec.prompt is absent. Default "prompt"; set null for endpoints
    # that reject unknown top-level fields.
    # prompt_body_key: prompt

models:
  - ref: "hf:Wan-AI/Wan2.2-T2V-A14B:wan2.2_14b.safetensors"
    kind: base
    target: checkpoints

lifecycle:
  budget: 5.0

# --- Layer K: per-job spec & params -----------------------------------------
# spec: is the engine-interpreted wire payload.  HostedAPIBackend.submit reads
# spec.model + spec.params and writes them into the POST body.
#
# NOTE: spec.model and engine.hosted.model serve different purposes and must
# be kept in sync manually until a future layer collapses them:
#   - engine.hosted.model -> HostedAPIEngine.key_base(cfg) -> CapabilityKey
#     (cache identity + profile-discovery key)
#   - spec.model          -> HostedAPIBackend.submit       -> wire request body
# If you change one, change the other.
spec:
  model: "wan-ai/Wan2.2-T2V-A14B"
  params:
    guidance_scale: 5.0

# params: are engine-neutral knobs every engine honors identically.  Flow into
# GenerationJob.params and merge segment-wins via Segment.params.
params:
  fps: 24
  num_frames: 81
  steps: 30
