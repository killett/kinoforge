# Upscale-only HEIGHT-TARGET cfg for `kinoforge upscale` → 1080p deliverable.
#
# Height-target variant of runpod-diffusers-flashvsr-x4-upscale.yaml: instead of a raw 4x factor,
# `upscale.scale: 1080p` asks for a 1080-pixel vertical deliverable. FlashVSR is
# 4x-native, so UpscaleStage resolves 1080p on a 480² source to 4x (→1920²) and
# the orchestrator materialize boundary lanczos-downscales 1920→1080 (aspect
# preserved → 1080×1080). Wan is NOT involved (upscale_only) — the source clip is
# supplied via --video, so this exercises the full height-target path
# (resolve→4x→downscale) at ~⅓ the time/cost of the render+upscale multi-stage.
#
# See docs/superpowers/specs/2026-07-05-height-target-upscale-design.md.
#
# Usage:
#   pixi run kinoforge upscale \
#     --config examples/configs/runpod-diffusers-flashvsr-1080p-upscale.yaml \
#     --video /path/to/480sq_clip.mp4 \
#     --no-reuse

engine:
  kind: diffusers
  precision: bfloat16
  diffusers:
    # BSA prebuilt wheel is linked against torch 2.8 + CUDA 12.8. The
    # image field here (used by kinoforge's diffusers provisioner as the
    # actual pod OS image) MUST match the compute.image below or BSA
    # loads against torch 2.4/cu124 and errors at inference with
    # `undefined symbol _ZN3c105ErrorC2ENS_14SourceLocation...`.
    image: "runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04"
    server_cmd:
      - "python"
      - "-m"
      - "kinoforge.engines.diffusers.servers.wan_t2v_server"
    pip:
      # DO NOT reinstall torch here — the BSA wheel is really cu124/torch2.4
      # despite its tag; reinstalling breaks BSA's c10 ABI at inference.
      - "fastapi>=0.115"
      - "uvicorn>=0.30"
      - "imageio[ffmpeg]>=2.34"
      - "modelscope"
    embed_modules:
      - "kinoforge.engines.diffusers.servers"
      - "kinoforge.upscalers.flashvsr"
    embed_files:
      - "kinoforge.core.errors"
      - "kinoforge.core.scale_target"
    # Skip eager WanPipeline load — pod runs only the on-demand FlashVSR
    # runtime. Cuts cold-boot to ~5min (no Wan 14B download).
    upscale_only: true

# No models[] — upscale_only=true. FlashVSR weights fetched via
# upscale.flashvsr.weights_bundle at provision time.
models: []

compute:
  provider: runpod
  image: "runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04"
  mode: pod
  # Dedicated hosts — RunPod terminated 2 community-adjacent smoke pods
  # mid-run on 2026-07-05; secure pins the host pool for the ~8min job.
  cloud_type: secure
  requirements:
    min_vram_gb: 80
    min_cuda: "12.4"
    # Widened 2026-07-07: 4 Ampere/Hopper 80GB types under a $3 cap makes a
    # capacity miss rarer; capacity_wait rides out whatever miss remains.
    # Blackwell RTX-6000 is deliberately excluded — its BSA wheel is cu124.
    max_usd_per_hr: 3.00
    disk_gb: 60
    gpu_preference:
      - "NVIDIA A100 80GB PCIe"
      - "NVIDIA A100-SXM4-80GB"
      - "NVIDIA H100 80GB HBM3"
      - "NVIDIA H100 NVL"
  lifecycle:
    boot_timeout: 15m
    idle_timeout: 30m
    job_timeout: 15m
    time_buffer: 3m
    max_lifetime: 90m
    budget: 1.5
    heartbeat_interval_s: 30
    # Ride transient RunPod capacity droughts: re-query offers + retry create
    # for up to 5m before failing (2026-07-07).
    capacity_wait: 5m

spec:
  model: "flashvsr-wan21-bfloat16"

upscale:
  # Height target: resolve to FlashVSR's native 4x (480→1920), then downscale
  # 1920→1080 at the orchestrator materialize boundary.
  engine: flashvsr
  scale: 1080p
  flashvsr:
    weights_bundle: "hf:JunhaoZhuang/FlashVSR-v1.1"
    precision: bfloat16
    window_size: 24
    tile_size: 512
    long_video_mode: false
