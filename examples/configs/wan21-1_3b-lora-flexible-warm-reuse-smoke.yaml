# Wan 2.1 T2V-1.3B + LoRA-flexible warm-reuse smoke cfg (Tier 3)
#
# Smaller-sibling counterpart to wan22-14b-lora-flexible-warm-reuse-release.yaml.
# Runs weekly via .github/workflows/smoke-wan21-weekly.yml (Mon 04:00 PT) on a
# RunPod A5000 24GB pod. Validates the real-diffusers LoRA-swap matrix
# (single-LoRA per Wan 2.1's single-transformer architecture) at ~$0.20/fire.
#
# Operator must populate `smoke.lora_a` + `smoke.lora_b` with two
# Wan 2.1 1.3B-compatible single LoRA refs BEFORE enabling the cron
# workflow. Per user-scope `fetch-lora-metadata-not-just-ids` memory,
# include trigger word + recommended strength in the README comment.

engine:
  kind: diffusers
  precision: fp16
  diffusers:
    image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
    server_cmd: ["python", "-m", "kinoforge.engines.diffusers.servers.wan_t2v_server"]
    pip:
      - "torch==2.6.0"
      - "torchvision==0.21.0"
      - "torchaudio==2.6.0"
      - "diffusers>=0.32"
      - "transformers>=4.45"
      - "accelerate>=1.0"
      - "fastapi>=0.115"
      - "uvicorn>=0.30"
      - "imageio[ffmpeg]>=2.34"
    base_url: "http://localhost:8000"
    prompt_body_key: "prompt"
    embed_modules: ["kinoforge.engines.diffusers.servers"]

models:
  - ref: "hf:Wan-AI/Wan2.1-T2V-1.3B-Diffusers"
    kind: base
    target: checkpoints

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: pod
  warm_reuse_auto_attach: true
  tags:
    smoke_tier: "kinoforge-smoke-tier-3"
  requirements:
    min_vram_gb: 24
    min_cuda: "12.4"
    max_usd_per_hr: 0.40
    gpu_preference:
      - "NVIDIA RTX A5000"
      - "NVIDIA RTX 4090"
      - "NVIDIA L4"
    disk_gb: 40
  lifecycle:
    idle_timeout: 10m
    job_timeout: 5m
    time_buffer: 2m
    max_lifetime: 30m
    boot_timeout: 15m
    budget: 0.50
    heartbeat_interval_s: 30
    lora_swap_re_probe_after_s: 300

spec:
  model: "Wan2.1-T2V-1.3B-Diffusers"
  pipeline: "WanPipeline"
  scheduler: "UniPCMultistepScheduler"
  width: 480
  height: 480
  num_frames: 33
  fps: 16

# Official Wan 2.1 1.3B T2V test LoRA pair. Operator-specified
# (2026-06-21). Both ship on the "Wan Video 1.3B t2v" base so 1.3B
# compatibility is explicit, not inferred. Picked for cross-style
# mp4-sha distinctness across the 4-step swap matrix.
# Full metadata + activation guidance in README.md
# "Default test LoRAs (Wan 2.1 1.3B T2V)".
#
# - lora_a: wan2.1 1.3b static rotation (camera-rotation motion)
#     trigger: "sttcrttn", strength: 1.0
#     https://civitai.com/models/1479320?modelVersionId=1673265
# - lora_b: Pokemon Sprite Animation Video LoRA (Gen-5 sprite art)
#     no trigger word (activates by load); recommended 768x768
#     output; strength: 1.0
#     https://civitai.com/models/1595383?modelVersionId=1805395
smoke:
  lora_a: "civitai:1479320@1673265"
  lora_b: "civitai:1595383@1805395"
