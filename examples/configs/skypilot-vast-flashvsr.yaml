# Upscale-only FlashVSR on vast.ai via SkyPilot (slice-1 live proof).
#
# Proves the provider-internal SSH-tunnel HTTP path: SkyPilotProvider launches a
# vast GPU, opens ssh -L to the diffusers server's :8000, and the existing
# upscale path drives it over http://127.0.0.1:<port> unchanged.
#
# See docs/superpowers/specs/2026-07-07-skypilot-vast-video-gen-design.md.
#
# Usage:
#   pixi run -e live-skypilot kinoforge upscale \
#     --config examples/configs/skypilot-vast-flashvsr.yaml \
#     --video output/20260630-221857_..._Photorealistic-cinem.mp4 \
#     --no-reuse

engine:
  kind: diffusers
  precision: bfloat16
  diffusers:
    image: "runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04"
    server_cmd:
      - "python"
      - "-m"
      - "kinoforge.engines.diffusers.servers.wan_t2v_server"
    pip:
      - "fastapi>=0.115"
      - "uvicorn>=0.30"
      - "imageio[ffmpeg]>=2.34"
      - "modelscope"
    embed_modules:
      - "kinoforge.engines.diffusers.servers"
      - "kinoforge.upscalers.flashvsr"
    embed_files:
      - "kinoforge.core.errors"
      - "kinoforge.core.scale_target"
    upscale_only: true

models: []

compute:
  provider: skypilot
  cloud:
    - "vast"
  image: "runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04"
  mode: pod
  requirements:
    # vast's catalog reports a flat cuda=12.0 for every SKU (it doesn't publish
    # per-host driver caps), so a 12.4 floor would reject the entire catalog.
    # The 12.8 image ships its own toolkit; the host only needs a recent driver,
    # which A100/H100 vast hosts have. Gate on 12.0 and pick the card by pref.
    min_cuda: "12.0"
    # Aim a single-card 80GB Ampere/Hopper (A100 80GB ≈ $0.93/hr on vast) — the
    # exact class the FlashVSR BSA wheel (cu124/torch2.4, Ampere/Hopper) needs.
    # gpu_preference only sorts, so keep min_vram_gb high enough that cheap
    # consumer MULTI-gpu aggregates (RTX3060 "48GB" = 4×12GB) can't win.
    min_vram_gb: 79
    max_usd_per_hr: 1.00
    disk_gb: 60
    gpu_preference:
      - "A100"
      - "H100"
  lifecycle:
    boot_timeout: 15m
    idle_timeout: 30m
    job_timeout: 15m
    time_buffer: 3m
    max_lifetime: 90m
    budget: 1.0
    capacity_wait: 5m

spec:
  model: "flashvsr-wan21-bfloat16"

upscale:
  engine: flashvsr
  scale: 1080p
  flashvsr:
    weights_bundle: "hf:JunhaoZhuang/FlashVSR-v1.1"
    precision: bfloat16
    window_size: 24
    tile_size: 512
    long_video_mode: false
