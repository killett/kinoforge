# Wan 2.2 14B T2V on RunPod + ComfyUI — dual-diffusion (HIGH + LOW) via
# Kijai's I2V-A14B HIGH/LOW pair run in T2V mode.
#
# Wan 2.2 architectural delta vs Wan 2.1: dual-diffusion sampling.
#   - HIGH model: high-noise stage (steps 0..boundary)
#   - LOW model: low-noise stage (steps boundary..end)
#   - Two WanVideoSampler nodes chained via the `samples` input.
#   - Both samplers share the same image_embeds / text_embeds inputs.
#
# T2V derivation: Kijai publishes only I2V-A14B HIGH/LOW pair on
# WanVideo_comfy (the native Wan-AI T2V-A14B repo is sharded and not
# supported by the Kijai loader). We run the I2V weights in T2V style
# by feeding WanVideoEmptyEmbeds (no init image), same trick as the
# Wan 2.1 T2V configs.
#
# On-disk total: ~28 GB HIGH + ~28 GB LOW + 0.5 GB VAE + 6.7 GB T5
# ≈ 63 GB. VRAM with quantization='fp8_e4m3fn' on-the-fly cast:
# ~14 GB HIGH + ~14 GB LOW; with aggressive block_swap=25, fits on
# 24 GB GPUs (4090 / A5000 / 3090).
#
# Intended use: cross-capability-key cold-create demonstration against
# the 5B sibling (runpod-comfyui-wan-t2v-5b.yaml), plus the standard
# cold→warm pair on the 14B pod itself.
#
# Cost guards (heavier than 5B because of 63 GB weight pull):
#   - max_usd_per_hr: 0.50
#   - budget: 4.00 (covers ~30m on 4090 at $0.40/hr)
#   - idle_timeout: 15m + selfterm
#   - kinoforge destroy --id <id> after

engine:
  kind: comfyui
  precision: bf16
  comfyui:
    version: "0.3.10"
    custom_nodes:
      - git: "https://github.com/kijai/ComfyUI-WanVideoWrapper"
        ref: "088128b224242e110d3906c6750e9a3a348a659b"
      - git: "https://github.com/kijai/ComfyUI-KJNodes"
        ref: "369c8aee9ad4641823d0ffd7035076bcd297b6f2"
      - git: "https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite"
        ref: "4ee72c065db22c9d96c2427954dc69e7b908444b"

models:
  # Wan 2.2 14B dual-diffusion HIGH+LOW pair. Kijai's I2V-A14B
  # weights run in T2V mode via WanVideoEmptyEmbeds.
  - ref: "hf:Kijai/WanVideo_comfy:Wan2_2-I2V-A14B-HIGH_bf16.safetensors"
    kind: base
    target: diffusion_models
  - ref: "hf:Kijai/WanVideo_comfy:Wan2_2-I2V-A14B-LOW_bf16.safetensors"
    kind: base
    target: diffusion_models
  - ref: "hf:Kijai/WanVideo_comfy:Wan2_2_VAE_bf16.safetensors"
    kind: vae
    target: vae
  - ref: "hf:Kijai/WanVideo_comfy:umt5-xxl-enc-fp8_e4m3fn.safetensors"
    kind: text_encoder
    target: text_encoders

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: pod
  warm_reuse_auto_attach: true
  requirements:
    # 24 GB minimum — HIGH+LOW bf16 cast to fp8 on load = ~28 GB total
    # weights; block_swap streams blocks through ~14 GB VRAM working set.
    min_vram_gb: 24
    min_cuda: "12.4"
    max_usd_per_hr: 0.50
    gpu_preference:
      - "NVIDIA GeForce RTX 4090"
      - "NVIDIA RTX A5000"
      - "NVIDIA GeForce RTX 3090"
    # 100 GB disk: ~63 GB weights + ComfyUI runtime + custom nodes.
    disk_gb: 100
  lifecycle:
    # idle_timeout sized to cover 63 GB cold weight download. RunPod
    # ingress ~50-200 MB/s → 5-20 min. 25m gives headroom.
    idle_timeout: 25m
    job_timeout: 15m
    time_buffer: 3m
    # max_lifetime: cold boot (5m) + weight download (15m) + gen 1 (8m)
    # + gen 2 (5m) ≈ 35m. 75m gives 2x headroom.
    max_lifetime: 75m
    boot_timeout: 25m
    budget: 4.0
    heartbeat_interval_s: 30

spec:
  graph_file: runpod-comfyui-wan-t2v-14b-2_2.graph.json
  asset_node_ids: {}
  prompt_node_ids:
    # Node 16 = WanVideoTextEncode; feeds BOTH samplers (27 + 90).
    positive: "16"
  prompt_input_field: positive_prompt
  node_overrides: {}

params:
  fps: 16
  num_frames: 81
  steps: 20
  width: 480
  height: 480
