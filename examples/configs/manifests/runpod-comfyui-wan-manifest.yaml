# NOTE: Layer N's live smoke (tests/live/test_runpod_live.py) does NOT use
# this file. It's committed as forward scaffolding for a future
# Layer O engine-integration smoke. Layer N's smoke validates the
# RunPod provider's GraphQL lifecycle (find_offers → create → ready →
# destroy) end-to-end without any engine, weights, or generation.
#
# kinoforge batch manifest for Layer N live smoke (one i2v entry).
#
# This file is illustrative. The committed `file://` path below is
# container-absolute (/workspace/...) and works only inside the dev
# container. Contributors running the live smoke outside the container
# do NOT use this file directly — tests/live/test_runpod_live.py
# generates a per-run manifest with an absolute path resolved from the
# test process's working directory.

- prompt: "A landscape unfurling at dawn"
  mode: i2v
  run_id: layer-n-smoke
  assets:
    - kind: image
      role: init_image
      ref: "file:///workspace/tests/providers/fixtures/runpod/sample_init_frame.png"
