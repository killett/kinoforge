# NOTE: Layer N's live smoke (tests/live/test_runpod_live.py) does NOT use
# this file. It's committed as forward scaffolding for a future
# Layer O engine-integration smoke. Layer N's smoke validates the
# RunPod provider's GraphQL lifecycle (find_offers → create → ready →
# destroy) end-to-end without any engine, weights, or generation.
#
# kinoforge example: Layer N live-smoke config — ComfyUI + Wan 2.2 i2v on RunPod.
#
# Usage:
#   1. Export creds:
#        export RUNPOD_API_KEY=...
#        export RUNPOD_TERMINATE_KEY=...   # scoped, terminate-only
#   2. (Optional, fixture refresh) export KINOFORGE_SAVE_FIXTURES=1
#   3. Run the gated live test:
#        KINOFORGE_LIVE_TESTS=1 pixi run pytest tests/live/test_runpod_live.py -v
#
# Cost guards (quadruple-locked):
#   - max_cost_rate_usd_per_hr filters expensive GPUs upstream of create_instance
#   - budget tears the pod down via BudgetTracker mid-run if exceeded
#   - idle_timeout + selfterm script self-destructs the pod after 10 min idle
#   - tests/live/test_runpod_live.py wraps everything in a finally: destroy block

engine:
  kind: comfyui
  precision: fp16
  comfyui:
    version: "0.3.10"

models:
  - ref: "hf:Wan-AI/Wan2.2-I2V-A14B:wan2.2_14b_i2v.safetensors"
    kind: base
    target: checkpoints

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: pod
  requirements:
    min_vram_gb: 24
    min_cuda: "12.4"
    max_cost_rate_usd_per_hr: 0.50
    gpu_preference:
      - "NVIDIA GeForce RTX 3090"
      - "NVIDIA RTX A5000"
      - "NVIDIA GeForce RTX 4090"
    disk_gb: 80
  lifecycle:
    idle_timeout: 10m
    job_timeout: 15m
    time_buffer: 5m
    max_lifetime: 30m
    budget: 2.0

spec:
  graph:
    nodes: []
  node_overrides: {}

params:
  fps: 16
  num_frames: 81
  steps: 20
  width: 480
  height: 480

# Layer O — user-facing output directory.  Uncomment to override defaults.
# Final clips are published to <dir>/<batch_id>?/{YYYYMMDD-HHMMSS}_{prompt-slug}{ext}.
# Internal artifacts (profile cache, ledger, weights) stay under --state-dir
# regardless of this block.
# output:
#   kind: local        # only "local" ships in v1
#   dir: output        # relative-to-cwd or absolute
#   enabled: true      # set false to skip publishing for this config
