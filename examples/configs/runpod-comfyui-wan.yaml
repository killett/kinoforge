# Layer P live smoke — ComfyUI + Wan 2.1 i2v 14B 480P fp8 on RunPod.
#
# Wan 2.1 (not 2.2): 2.2 i2v is a 2-UNet MoE architecture (~125 GB total)
# which exceeds the 80 GB pod disk budget. Wan 2.1 i2v fp8 fits in ~25 GB
# (single UNet 17 GB + VAE 0.25 GB + T5 text encoder 6.7 GB) and exercises
# the same engine/provider/generation paths.
#
# Usage:
#   export RUNPOD_API_KEY=...
#   export RUNPOD_TERMINATE_KEY=...
#   export HF_TOKEN=...                     # Wan weights are gated
#   export KINOFORGE_LIVE_TESTS=1
#   export KINOFORGE_SAVE_FIXTURES=1        # first green run only
#   export KINOFORGE_LIVE_KEEP_POD=1        # dev iteration — reuses warm pod
#
# Then:
#   pixi run pytest tests/live/test_comfyui_wan_live.py -v -s
#
# Cost guards (quadruple-locked):
#   - max_usd_per_hr: 0.50  (filters expensive GPUs upstream)
#   - budget: 2.00                    (BudgetTracker tears down mid-run)
#   - idle_timeout: 10m + selfterm    (pod self-destructs after 10 min idle)
#   - finally: in test always destroys (unless KEEP_POD=1)

engine:
  kind: comfyui
  precision: fp16
  comfyui:
    version: "0.3.10"
    custom_nodes:
      - git: "https://github.com/kijai/ComfyUI-WanVideoWrapper"
        ref: "088128b224242e110d3906c6750e9a3a348a659b"
      - git: "https://github.com/kijai/ComfyUI-KJNodes"
        ref: "369c8aee9ad4641823d0ffd7035076bcd297b6f2"
      # VHS_VideoCombine — required by the kijai i2v workflow's output node
      # (graph node 30). Diagnose run 2026-06-03 (pod 0wxzr9iowrgmpw) confirmed
      # this is a separate custom_nodes pack, not bundled with kijai or ComfyUI.
      - git: "https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite"
        ref: "4ee72c065db22c9d96c2427954dc69e7b908444b"

models:
  - ref: "hf:Kijai/WanVideo_comfy:Wan2_1-I2V-14B-480P_fp8_e4m3fn.safetensors"
    kind: base
    target: diffusion_models
  - ref: "hf:Kijai/WanVideo_comfy:Wan2_1_VAE_bf16.safetensors"
    kind: vae
    target: vae
  - ref: "hf:Kijai/WanVideo_comfy:umt5-xxl-enc-fp8_e4m3fn.safetensors"
    kind: text_encoder
    target: text_encoders

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: pod
  requirements:
    min_vram_gb: 24
    min_cuda: "12.4"
    max_usd_per_hr: 0.50
    gpu_preference:
      - "NVIDIA GeForce RTX 4090"
      - "NVIDIA RTX A5000"
      - "NVIDIA GeForce RTX 3090"
    disk_gb: 80
  lifecycle:
    idle_timeout: 10m
    job_timeout: 15m
    time_buffer: 5m
    max_lifetime: 40m
    # Wan diffusion (~30 GB) + VAE + text encoder cold-boot empirically
    # 5-15 min; 30m (1800 s -> Lifecycle.boot_timeout_s) leaves headroom
    # over Layer Q's 900 s LifecycleConfig default.
    boot_timeout: 30m
    budget: 2.0

spec:
  graph_file: runpod-comfyui-wan.graph.json
  asset_node_ids:
    # Node 58 = LoadImage in the kijai Wan i2v example_03 workflow;
    # supplies the i2v start frame consumed by node 68 (ImageResizeKJv2)
    # then node 63 (WanVideoImageToVideoEncode).
    init_image: "58"
  prompt_node_ids:
    # Node 16 = WanVideoTextEncode; feeds node 27 (WanVideoSampler.text_embeds).
    # The kijai i2v example_03 ships a single text-encode node — negative
    # prompt is graph-baked (see spec §14.0 Q3).
    positive: "16"
  node_overrides: {}

params:
  fps: 16
  num_frames: 81
  steps: 20
  width: 480
  height: 480

# Output sink (Layer O) — uncomment to override defaults.
# output:
#   kind: local
#   dir: output
#   enabled: true
