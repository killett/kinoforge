# Wan 2.2 5B FastWan TI2V on RunPod + ComfyUI — text-only mode.
#
# Wan 2.2 architectural changes vs Wan 2.1:
#   - New VAE (Wan2_2_VAE_bf16.safetensors) — incompatible with 2.1 VAE.
#   - 5B variant published by Kijai is FastWan distilled (TI2V architecture);
#     we run it in T2V style by feeding WanVideoEmptyEmbeds with no init
#     image, same pattern as the Wan 2.1 1.3B T2V cfg.
#   - flowmatch_pusa scheduler (replaces unipc for FastWan distill).
#
# On-disk total: ~5 GB diffusion + 0.5 GB VAE + 6.7 GB T5 ≈ 12 GB.
# VRAM requirement: ~14 GB peak with bf16 + offload; 16 GB GPUs cover.
#
# Intended use: CLI cross-invocation warm-reuse demonstration plus
# capability-key isolation against the 14B sibling
# (runpod-comfyui-wan-t2v-14b-2_2.yaml).
#
# Usage:
#   pixi run kinoforge generate \
#     --config examples/configs/runpod-comfyui-wan-t2v-5b.yaml \
#     --prompt "$(cat examples/configs/prompts/field-realistic.txt)" \
#     --mode t2v
#   pixi run kinoforge generate \
#     --config examples/configs/runpod-comfyui-wan-t2v-5b.yaml \
#     --prompt "$(cat examples/configs/prompts/field-dreamlike.txt)" \
#     --mode t2v
#
# Cost guards:
#   - max_usd_per_hr: 0.50
#   - budget: 2.00
#   - idle_timeout: 15m + selfterm watchdog
#   - kinoforge destroy --id <id> at end

engine:
  kind: comfyui
  precision: bf16
  comfyui:
    version: "0.3.10"
    custom_nodes:
      - git: "https://github.com/kijai/ComfyUI-WanVideoWrapper"
        ref: "088128b224242e110d3906c6750e9a3a348a659b"
      - git: "https://github.com/kijai/ComfyUI-KJNodes"
        ref: "369c8aee9ad4641823d0ffd7035076bcd297b6f2"
      - git: "https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite"
        ref: "4ee72c065db22c9d96c2427954dc69e7b908444b"

models:
  # Wan 2.2 5B FastWan TI2V (run in T2V mode via WanVideoEmptyEmbeds).
  - ref: "hf:Kijai/WanVideo_comfy:FastWan/Wan2_2-TI2V-5B-FastWanFullAttn_bf16.safetensors"
    kind: base
    target: diffusion_models
  # NEW Wan 2.2 VAE — 2.1 VAE is incompatible.
  - ref: "hf:Kijai/WanVideo_comfy:Wan2_2_VAE_bf16.safetensors"
    kind: vae
    target: vae
  # T5 text encoder — same as Wan 2.1.
  - ref: "hf:Kijai/WanVideo_comfy:umt5-xxl-enc-fp8_e4m3fn.safetensors"
    kind: text_encoder
    target: text_encoders

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: pod
  warm_reuse_auto_attach: true
  requirements:
    min_vram_gb: 16
    min_cuda: "12.4"
    max_usd_per_hr: 0.50
    gpu_preference:
      - "NVIDIA GeForce RTX 4090"
      - "NVIDIA RTX A5000"
      - "NVIDIA GeForce RTX 3090"
    disk_gb: 40
  lifecycle:
    idle_timeout: 15m
    job_timeout: 10m
    time_buffer: 3m
    max_lifetime: 60m
    boot_timeout: 20m
    budget: 2.0
    # REQUIRED for cross-CLI warm-reuse. Without it the HeartbeatLoop
    # never starts and cmd 2's classify returns HEARTBEAT_UNKNOWN →
    # cold create. Empirically verified by the 1.3B smoke (commit 7b93725).
    heartbeat_interval_s: 30

spec:
  graph_file: runpod-comfyui-wan-t2v-5b.graph.json
  asset_node_ids: {}
  prompt_node_ids:
    # Node 16 = WanVideoTextEncode; feeds node 27 (WanVideoSampler.text_embeds).
    positive: "16"
  prompt_input_field: positive_prompt
  node_overrides: {}

params:
  fps: 24
  num_frames: 81
  steps: 20
  width: 480
  height: 480
