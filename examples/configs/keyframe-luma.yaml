# Keyframe via Luma: Luma generates the first frame, fal generates the clip.
#
# The keyframe block routes to LumaAgentsImageEngine (agents API, UNI-1). The resulting image is injected as the
# init_image conditioning asset for the fal wan-i2v model — identical
# plumbing to keyframe-fal-i2v.yaml with the image side swapped.
#
# Set LUMAAI_API_KEY (and FAL_KEY for the video half) in .env.
#
# Targets the Luma agents API (agents.lumalabs.ai/v1) — model uni-1
# (default; uni-1-max also documented). Verified 2026-07-03 against
# docs.agents.lumalabs.ai. The retired dream-machine surface 403s.

mode: i2v
prompt: "a cat walking through a sunlit meadow, soft motion"

engine:
  kind: fal
  precision: ""
  fal:
    endpoint: "fal-ai/wan-i2v"
    queue_base: "https://queue.fal.run"
    api_key_env: "FAL_KEY"
    url_path: "video.url"

spec:
  model: "fal-ai/wan-i2v"

keyframe:
  engine: luma_agents
  prompt: "photorealistic cat in a sunlit meadow, shot on 35mm film, shallow depth of field"
  spec:
    model: "uni-1"
    params:
      aspect_ratio: "16:9"

models:
  - kind: base
    ref: "fal://fal-ai/wan-i2v"
    target: checkpoints

compute: null

lifecycle:
  idle_timeout: 60s
  job_timeout: 30m
  max_lifetime: 1h
  budget: 1.0
  max_in_flight: 1
