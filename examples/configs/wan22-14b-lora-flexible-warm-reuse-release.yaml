# Wan 2.2 T2V-A14B + LoRA-flexible warm-reuse release-gate cfg (Tier 4)
#
# Cold-boots a single A100 80GB pod with the diffusers Wan T2V server
# and NO initial LoRA stack. The smoke
# (tests/smoke/release_wan22/test_lora_swap_matrix.py) drives
# POST /lora/set_stack directly to add/swap the Arcane Style LoRA
# pair (civitai:2197303@2474081 + civitai:2197303@2474073) across the
# 4-step matrix in docs/superpowers/specs/2026-06-20-lora-flexible-warm-reuse-design.md §13.3.
#
# Tier 4 of the LoRA smoke pyramid (docs/superpowers/specs/2026-06-21-lora-smoke-pyramid-design.md).
# Manual release gate — fired only via `pixi run smoke-wan22-live` from
# the release checklist; no automated cron trigger.
#
# Total budget cap: $5 (covers ~2.5h of A100 80GB at $1.79/hr; the
# smoke targets ~$2 of spend, with the rest of the budget as a safety
# valve for HF-Hub slow days during cold-boot).

engine:
  kind: diffusers
  precision: bf16
  diffusers:
    image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
    server_cmd:
      - "python"
      - "-m"
      - "kinoforge.engines.diffusers.servers.wan_t2v_server"
    pip:
      - "torch==2.6.0"
      - "torchvision==0.21.0"
      - "torchaudio==2.6.0"
      - "diffusers>=0.32"
      - "transformers>=4.45"
      - "accelerate>=1.0"
      - "peft>=0.13"      # required by diffusers' LoRA loaders (set_adapters, unload_lora_weights)
      - "fastapi>=0.115"
      - "uvicorn>=0.30"
      - "imageio[ffmpeg]>=2.34"
    base_url: "http://localhost:8000"
    prompt_body_key: "prompt"
    embed_modules:
      - "kinoforge.engines.diffusers.servers"

models:
  # Base only — LoRAs are driven imperatively via /lora/set_stack from
  # the smoke driver, not declared statically.
  - ref: "hf:Wan-AI/Wan2.2-T2V-A14B-Diffusers"
    kind: base
    target: checkpoints

compute:
  provider: runpod
  image: "runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04"
  mode: pod
  warm_reuse_auto_attach: true
  tags:
    smoke_tier: "kinoforge-smoke-tier-4"
  requirements:
    min_vram_gb: 80
    min_cuda: "12.4"
    max_usd_per_hr: 3.00
    # 2026-06-23: SXM first because A100 80GB PCIe stockStatus=Low caused
    # back-to-back cold-boot pod-deaths (8h91rjnslmzwab, 9e2dsucq33zron)
    # during this session's Tier-4 fire. SXM is stockStatus=High at
    # +$0.10/hr — a worthwhile reliability tradeoff for the release gate.
    gpu_preference:
      - "NVIDIA A100-SXM4-80GB"
      - "NVIDIA A100 80GB PCIe"
      - "NVIDIA H100 80GB HBM3"
      - "NVIDIA H100 PCIe"
    # ~63 GB base weights + HF cache overhead + room for 2 Arcane
    # LoRAs (~600 MB each) + scratch.
    disk_gb: 150
  lifecycle:
    # 2026-06-23 P2 Tier-4 dual-transformer routing smoke runs 7 cases on
    # one warm pod (~45-60 min wall clock); previous 30m idle_timeout
    # tripped mid-matrix even with GPU at 100% (8h91rjnslmzwab died at
    # ~30 min uptime during case-1 generate). Bumped to give matrix
    # headroom — does not affect the 4-step swap-matrix smoke which
    # completes well within the old window.
    idle_timeout: 90m
    job_timeout: 15m
    time_buffer: 3m
    max_lifetime: 180m
    boot_timeout: 60m
    budget: 5.0
    heartbeat_interval_s: 30
    # T19 cfg field — 300s default; matcher trusts the ledger snapshot
    # for 5 minutes before re-probing the pod's /lora/inventory.
    lora_swap_re_probe_after_s: 300

spec:
  model: "Wan2.2-T2V-A14B-Diffusers"
  pipeline: "WanPipeline"
  scheduler: "UniPCMultistepScheduler"
  width: 480
  height: 480
  num_frames: 81
  fps: 16
