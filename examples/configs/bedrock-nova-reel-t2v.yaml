# AWS Bedrock Nova Reel 1.1 — text-to-video on the official Amazon model.
#
# Setup (one-time, automated in Layer 3 plan Tasks 4-5):
#   1. Attach .aws/policies/bedrock-nova-reel.json to the kinoforge-ci IAM user
#   2. Verify Nova Reel model access via `pixi run probe-hosted --config examples/configs/bedrock-nova-reel-t2v.yaml`
#
# Live smoke: `KINOFORGE_LIVE_TESTS=1 pixi run pytest tests/live/test_nova_reel_live.py -v`
#
# The prompt body is loaded at smoke-test runtime from
# /workspace/examples/configs/prompts/field-realistic.txt per the project's standard-prompt
# directive (see PROGRESS.md "Standard prompt for all video-generation live
# smokes").

engine:
  kind: bedrock_video
  precision: fp16
  bedrock_video:
    region_name: us-east-1
    model_id: amazon.nova-reel-v1:1
    output_s3_uri: s3://kinoforge-nova-reel-output/
    model_input_template:
      taskType: TEXT_VIDEO
      textToVideoParams:
        text: "${PROMPT}"
      videoGenerationConfig:
        durationSeconds: 6
        fps: 24
        dimension: "1280x720"

models:
  - kind: base
    ref: bedrock://amazon.nova-reel-v1:1
    target: checkpoints

lifecycle:
  budget: 5.0

spec:
  prompt: ""  # filled at runtime from /workspace/examples/configs/prompts/field-realistic.txt

params: {}
