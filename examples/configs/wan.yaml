# kinoforge example: ComfyUI + RunPod (pod mode) with Wan2.2
#
# Demonstrates the canonical production path:
#   - ComfyUI engine on a RunPod GPU pod
#   - All three model sources: HuggingFace (base), CivitAI (LoRA), HTTPS (VAE)
#   - Budget-guarded lifecycle with autostop

engine:
  kind: comfyui
  precision: fp16
  comfyui:
    version: "0.3.10"

# Wan-AI/Wan2.2-T2V-A14B ships as a sharded diffusers model:
#   high_noise_model/diffusion_pytorch_model-{00001..00006}-of-00006.safetensors
#   low_noise_model/diffusion_pytorch_model-{00001..00006}-of-00006.safetensors
# The ref below points at the first high-noise shard as the
# reachability anchor for cfg validation (HEAD probe). Loading the
# full model is engine-side: configure the engine + container image
# to fetch every shard from the same HF repo. Do NOT shorten the
# ref to bare `wan2.2_14b.safetensors` — that filename does not
# exist on the Hub.
models:
  - ref: "hf:Wan-AI/Wan2.2-T2V-A14B:high_noise_model/diffusion_pytorch_model-00001-of-00006.safetensors"
    kind: base
    target: checkpoints

  # Default test LoRA pair — Arcane Style [WAN 2.2 T2V] v1.0
  # (CivitAI model 2197303). Wan 2.2 is MoE w/ two transformers, so
  # the full-effect LoRA ships as a pair: one tensor per transformer.
  # Order matters — high-noise first, then low-noise — because the
  # ordered loras list is part of CapabilityKey identity. See the
  # "Default test LoRA (Wan 2.2 T2V)" section in README.md for the
  # canonical write-up, including the Wan 2.1-as-low-noise fallback
  # and high-only / low-only single-tensor variants this pair does
  # NOT exercise.
  #
  # NOTE (PROGRESS C23): the wan ComfyUI graph JSONs do not yet have
  # a WanVideoLoraSelect node wired into WanVideoSampler.lora, so
  # mounting these refs via the ComfyUI engine is a no-op at sampler
  # time until C23 ships. Refs left in place so the canonical pair
  # is committed in the repo.
  - ref: "civitai:2197303@2474081"     # high-noise transformer
    kind: lora
    target: loras

  - ref: "civitai:2197303@2474073"     # low-noise transformer
    kind: lora
    target: loras

  - ref: "https://cdn.example.com/vae/wan2-vae-fp16.safetensors"
    kind: vae
    target: vae

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: pod
  # warm_reuse_auto_attach: true  # B3 default — scan ledger for warm pods
  #                               # matching this cfg's capability_key and
  #                               # attach transparently on every fresh shell.
  #                               # Set to false per-project to disable;
  #                               # --no-reuse on the CLI overrides per-call.
  requirements:
    min_vram_gb: 80
    min_cuda: "12.4"
    max_usd_per_hr: 3.50
    gpu_preference:
      - "A100 80GB"
      - "H100 80GB"
    disk_gb: 200
  lifecycle:
    idle_timeout: 2h
    job_timeout: 30m
    time_buffer: 30m
    max_lifetime: 5h
    budget: 25.0
    # Layer U — heartbeat persistence. Background thread that pings
    # provider.heartbeat() and persists the timestamp to the ledger
    # every N seconds. Operator-visible via
    # `kinoforge status --id <id>` ("last_heartbeat=<ISO>").
    # Required when warm_reuse_auto_attach=true (the default).
    heartbeat_interval_s: 30
    # Layer V — post-session warm-reuse grace window. Sentinel-stale
    # entries within this window are classified LIVE (not ORPHAN_REAP).
    # grace_after_session_s: 300

# --- Layer K: per-job spec & params -----------------------------------------
# ComfyUIBackend.submit deep-merges spec.node_overrides onto spec.graph, then
# POSTs to /prompt.  asset_node_ids + prompt_node_ids (both optional) route
# Segment.assets and Segment.prompt into the graph; see the Layer J comment
# block below for prompt_node_ids details.
spec:
  graph:
    # Replace with your real ComfyUI workflow JSON. The empty stub here keeps
    # the example load test green; do not run generate() against it.
    nodes: []
  node_overrides: {}
  # asset_node_ids:
  #   init_image: "5"
  # prompt_node_ids:
  #   main: "6"

params:
  fps: 24
  num_frames: 81
  steps: 30

# --- Optional: artifact-store selection (Phase 13 / Layer C) -----------------
# Absent block → LocalArtifactStore(state_dir) where state_dir is --state-dir.
#
# Explicit local with custom root:
# store:
#   kind: local
#   root: ./my-custom-root
#
# S3:
# store:
#   kind: s3
#   bucket: my-org-kinoforge
#   prefix: prod/runs
#
# GCS:
# store:
#   kind: gcs
#   bucket: my-org-kinoforge
#   prefix: prod/runs
#
# --- Layer W: encryption + signed URLs (optional) ----
# Optional: encrypt object writes with a customer-managed KMS key.
# Default mode uses provider-managed encryption (SSE-S3 / Google-managed).
# encryption:
#   mode: kms
#   kms_key_id: arn:aws:kms:us-east-1:123456789012:key/abc-def
# signed_url_default_ttl_s: 3600  # seconds; caller may override per-call

# --- Optional: ComfyUI prompt routing (Layer J) ------------------------------
# When the orchestrator drives the CLI prompt, set spec.prompt_node_ids in
# your spec dict to declare which graph node receives the prompt text.
# Currently routed into <node>.inputs.text (suitable for CLIPTextEncode and
# most prompt-encoder nodes); non-standard encoders can override via
# node_overrides directly.
#
# Example (placed in spec, not in cfg):
#   spec:
#     graph: { ... }
#     node_overrides: { ... }
#     prompt_node_ids:
#       main: "6"   # node id of the positive-prompt CLIPTextEncode node

# Layer O — user-facing output directory.  Uncomment to override defaults.
# Final clips are published to <dir>/<batch_id>?/{YYYYMMDD-HHMMSS}_{prompt-slug}{ext}.
# Internal artifacts (profile cache, ledger, weights) stay under --state-dir
# regardless of this block.
# output:
#   kind: local        # only "local" ships in v1
#   dir: output        # relative-to-cwd or absolute
#   enabled: true      # set false to skip publishing for this config
