# kinoforge example: DiffusersEngine + RunPod (serverless mode)
#
# Demonstrates the Diffusers path:
#   - DiffusersEngine with explicit pipeline + scheduler in spec
#   - RunPod serverless endpoint (no persistent pod cost)
#   - HuggingFace model source

engine:
  kind: diffusers
  precision: fp16
  # diffusers:
  #   # Optional: top-level body key for prompt routing (default "prompt").
  #   prompt_body_key: prompt

models:
  - ref: "hf:stabilityai/stable-video-diffusion-img2vid-xt:svd_xt.safetensors"
    kind: base
    target: checkpoints

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: serverless
  requirements:
    min_vram_gb: 24
    min_cuda: "12.4"
    max_cost_rate_usd_per_hr: 1.50
    gpu_preference:
      - "RTX 4090"
      - "A100 40GB"
    disk_gb: 100
  lifecycle:
    idle_timeout: 1h
    job_timeout: 20m
    time_buffer: 10m
    max_lifetime: 4h
    budget: 15.0

# --- Layer K: per-job spec & params -----------------------------------------
# DiffusersBackend.submit reads spec.pipeline + spec.scheduler to construct
# the request body for the headless diffusers server.
spec:
  pipeline: "DiffusionPipeline"
  scheduler: "DDIMScheduler"

params:
  fps: 24
  num_frames: 81
  steps: 30
