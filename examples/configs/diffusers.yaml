# kinoforge example: DiffusersEngine + RunPod (serverless mode)
#
# Demonstrates the Diffusers path:
#   - DiffusersEngine with explicit pipeline + scheduler in spec
#   - RunPod serverless endpoint (no persistent pod cost)
#   - HuggingFace model source

engine:
  kind: diffusers
  precision: fp16
  # diffusers:
  #   # Optional: top-level body key for prompt routing (default "prompt").
  #   prompt_body_key: prompt

models:
  - ref: "hf:stabilityai/stable-video-diffusion-img2vid-xt:svd_xt.safetensors"
    kind: base
    target: checkpoints

compute:
  provider: runpod
  image: "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
  mode: serverless
  # warm_reuse_auto_attach: true  # B3 default — see wan.yaml for full description.
  requirements:
    min_vram_gb: 24
    min_cuda: "12.4"
    max_usd_per_hr: 1.50
    gpu_preference:
      - "RTX 4090"
      - "A100 40GB"
    disk_gb: 100
  lifecycle:
    idle_timeout: 1h
    job_timeout: 20m
    time_buffer: 10m
    max_lifetime: 4h
    budget: 15.0
    # Layer U — heartbeat persistence. Background thread that pings
    # provider.heartbeat() and persists the timestamp to the ledger
    # every N seconds. Operator-visible via
    # `kinoforge status --id <id>` ("last_heartbeat=<ISO>").
    # Required when warm_reuse_auto_attach=true (the default).
    heartbeat_interval_s: 30
    # Layer V — post-session warm-reuse grace window. Sentinel-stale
    # entries within this window are classified LIVE (not ORPHAN_REAP).
    # grace_after_session_s: 300

# --- Layer K: per-job spec & params -----------------------------------------
# DiffusersBackend.submit reads spec.pipeline + spec.scheduler to construct
# the request body for the headless diffusers server.
spec:
  model: "stabilityai/stable-video-diffusion-img2vid-xt"
  pipeline: "DiffusionPipeline"
  scheduler: "DDIMScheduler"

params:
  fps: 24
  num_frames: 81
  steps: 30

# Layer O — user-facing output directory.  Uncomment to override defaults.
# Final clips are published to <dir>/<batch_id>?/{YYYYMMDD-HHMMSS}_{prompt-slug}{ext}.
# Internal artifacts (profile cache, ledger, weights) stay under --state-dir
# regardless of this block.
# output:
#   kind: local        # only "local" ships in v1
#   dir: output        # relative-to-cwd or absolute
#   enabled: true      # set false to skip publishing for this config
