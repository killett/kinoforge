repos:
  - repo: local
    hooks:  # On macOS, pixi-installed tools (pytest, ruff, mypy) can fail due to shebang path resolution issues. Using python -m <tool> bypasses this reliably.
      - id: ruff
        name: ruff
        # --force-exclude makes ruff honor pyproject.toml's extend-exclude even when
        # pre-commit passes file paths explicitly (e.g. tools/_vendored/ third-party code).
        entry: pixi run python -m ruff check --force-exclude --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        # --force-exclude — see ruff hook note above.
        entry: pixi run python -m ruff format --force-exclude
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: pixi run python -m mypy .
        language: system
        types: [python]
        pass_filenames: false

      # Built-in pygrep — no remote pre-commit-hooks dep, no network.
      # Real conflict markers: `<<<<<<< <ref>` and `>>>>>>> <ref>` (with
      # trailing space) and `=======` *alone on a line*. The bare-`=======`
      # form would otherwise false-positive on pytest's `======== … ========`
      # header lines (>7 equals followed by text), so we anchor it $.
      - id: check-merge-conflict
        name: check-merge-conflict
        entry: '^(<<<<<<< |>>>>>>> |={7}$)'
        language: pygrep

      # Local reimplementation of pre-commit-hooks' check-added-large-files
      # (default maxkb=500 → 500000 bytes). System bash + wc only; bash's
      # arithmetic context strips BSD-wc's leading whitespace so no tr needed.
      - id: check-added-large-files
        name: check-added-large-files (limit 500 KB; ComfyUI /object_info fixtures + pixi.lock excluded)
        entry: 'bash -c ''max=500000; rc=0; for f in "$@"; do sz=$(wc -c < "$f"); if (( sz > max )); then echo "$f: $sz bytes exceeds limit of $max" >&2; rc=1; fi; done; exit $rc'' --'
        language: system
        # ComfyUI /object_info fixtures captured by tools/capture_object_info.py
        # are inherently large (~3 MB) — one JSON per pack-stack-hash with all
        # registered node-class schemas. Excluded from the size cap by directory.
        # pixi.lock is auto-generated by pixi resolve and grows with each added
        # feature env (e.g. live-skypilot pulls ~500MB transitive deps which
        # bloats the lockfile past 500KB) — its size is intrinsic, not a
        # human-authored payload mistake.
        exclude: '^(tests/fixtures/comfyui/object_info/.*\.json|pixi\.lock)$'

      # Local reimplementation of pre-commit-hooks' check-toml. tomllib is
      # stdlib in 3.11+; this template requires 3.12+. Routed through
      # `pixi run python` so the env (and its Python) is the same one the
      # other hooks use.
      - id: check-toml
        name: check-toml
        entry: 'pixi run python -c ''import sys,tomllib;[tomllib.load(open(f,"rb")) for f in sys.argv[1:]]'''
        language: system
        types: [toml]
