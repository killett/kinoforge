name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # windows-latest declined — see windows-migration-cancelled.md

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Verify pixi installation
        run: pixi --version

      - name: Lint
        run: pixi run lint

      - name: Type check
        run: pixi run typecheck

      - name: Test
        run: pixi run test
