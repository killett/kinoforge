# Project pixi manifest.
#
# This file is the TEMPLATE that sandboxed-claude.sh runs through
# hooks/generate-pixi-toml.py to produce each new project's pixi.toml.
# Four placeholder strings (each starts and ends with a double-
# underscore) are substituted at scaffold time:
#
#   PROJECT_NAME placeholder    → project directory's basename (or --name)
#   GROUPS_CONDA_DEPS placeholder → one `name = "*"` line per
#                                   pixi_packages entry across selected
#                                   groups (conda-forge)
#   GROUPS_CONDA_DEPS_LINUX_ONLY placeholder
#                                 → one `name = "*"` line per
#                                   pixi_packages_linux_only entry;
#                                   lives in [target.linux-64.dependencies]
#                                   for packages with no osx-arm64 build
#   GROUPS_PYPI_DEPS placeholder  → one `name = "*"` line per
#                                   pixi_pypi_packages entry (PyPI)
#
# (The literal placeholder strings are deliberately not written out in
# this comment, because the generator does plain text replacement and
# would substitute them here too.)
#
# Anything outside the placeholders passes through verbatim. Adjust
# channels / platforms / tasks / features / activation as you like —
# they'll appear in every scaffolded project. Edit the dependency
# *contents* in groups.toml, not here.

[workspace]
name = "kinoforge"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]
exclude-newer = "7d"

# To urgently bypass the cooldown for a CVE fix, add:
# [exclude-newer]
# affected-package = "0d"

[dependencies]
python = ">=3.12,<3.14"
ruff = "*"
mypy = "*"
pytest = "*"
pytest-cov = "*"
pre-commit = "*"
# Group-derived conda packages are inserted on the line below.
requests = "*"
tenacity = "*"
tqdm = "*"
openjdk = "=25"
ipython = "*"
ipdb = "*"
py-spy = "*"
shellcheck = "*"
go-shfmt = "*"
taplo = "*"
git-delta = "*"
difftastic = "*"
hyperfine = "*"
go-yq = "*"
pydantic = ">=2.13.4,<3"
pyyaml = ">=6.0.3,<7"
types-pyyaml = ">=6.0.12.20260518,<7"

[pypi-dependencies]
# Group-derived PyPI-only packages are inserted on the line below.
graphifyy = "*"

# Conda deps that only resolve on linux-64 (e.g. ocrmypdf, which pulls
# pngquant — no osx-arm64 build available). Empty section is valid TOML
# and pixi accepts it as "no extra linux-64-only deps".
[target.linux-64.dependencies]


# Make `python -m <package>` work inside `pixi run` and `pixi shell` without an editable install. Avoids dragging uv + a build backend into the loop, which is fragile if any parent directory has a pyproject.toml that isn't PEP 621-valid.
[activation.env]
PYTHONPATH = "src"

[tasks]
# On macOS, pixi-installed tools (pytest, ruff, mypy) can fail due to shebang path resolution issues. Using python -m <tool> bypasses this reliably.
test = "python -m pytest"
test-cov = "python -m pytest --cov"  # Later on, consider adding --cov-fail-under=80
lint = "python -m ruff check ."
format = "python -m ruff format ."
typecheck = "python -m mypy ."
# pre-commit lives in the pixi env (see [dependencies] above) so its tools
# stay pinned and exclude-newer-governed like everything else. Same `python -m`
# shebang dodge as the tasks above. -install is what `docker-entrypoint.sh`
# runs on first launch to wire .git/hooks/pre-commit; idempotent on rerun.
#
# `pre-commit` is a pure pass-through: `pixi run pre-commit <args>` is
# identical to invoking the upstream `pre-commit <args>` CLI, since pixi
# forwards trailing argv to the task command. Examples:
#   pixi run pre-commit run                         # staged files
#   pixi run pre-commit run --files path/to/file    # scope to one file
#   pixi run pre-commit run --all-files             # whole repo
#   pixi run pre-commit install                     # wire .git/hooks
#   pixi run pre-commit autoupdate                  # bump hook revs
# The `-all` and `-install` aliases below are short-hands for the two
# most common one-shot workflows — they exist for muscle memory, not
# because the pass-through can't reach them.
pre-commit = "python -m pre_commit"
pre-commit-all = "python -m pre_commit run --all-files"
pre-commit-install = "python -m pre_commit install --install-hooks"
